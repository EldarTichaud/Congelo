<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CongélApp">
  <title>❄️ CongélApp</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #1e3a5f;
      --primary-mid: #1d4ed8;
      --accent: #0ea5e9;
      --bg: #f0f6ff;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    .slide-up { animation: slideUp 0.28s ease; }
    .fade-in  { animation: fadeIn 0.2s ease; }

    /* ── HEADER ── */
    .header {
      background: var(--primary);
      color: white;
      padding: 14px 18px;
      padding-top: calc(14px + env(safe-area-inset-top));
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub   { font-size: 11px; opacity: 0.65; margin-top: 1px; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .user-pill {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px; padding: 5px 12px;
      font-size: 13px; cursor: pointer; transition: background .2s;
    }
    .user-pill:hover { background: rgba(255,255,255,0.24); }
    .icon-btn {
      background: rgba(255,255,255,0.1); border: none;
      border-radius: 10px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; font-size: 17px; transition: background .2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── BANNERS ── */
    .banner {
      margin: 10px 14px 0;
      padding: 10px 14px;
      border-radius: 12px;
      display: flex; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 500;
    }
    .banner.expired  { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .banner.critical { background: #fff7ed; color: #7c2d12; border: 1px solid #fdba74; }
    .banner.warn     { background: #fefce8; color: #713f12; border: 1px solid #fde047; }

    /* ── SEARCH ── */
    .search-wrap { padding: 12px 14px 0; position: relative; }
    .search-icon { position: absolute; left: 26px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none; }
    .search-input {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-size: 15px; background: white; outline: none;
      transition: border-color .2s, box-shadow .2s; color: var(--text);
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }

    /* ── CHIPS ── */
    .chips-scroll { display: flex; gap: 7px; padding: 10px 14px; overflow-x: auto; scrollbar-width: none; }
    .chips-scroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 5px 13px; border-radius: 20px;
      font-size: 12.5px; border: 1.5px solid var(--border);
      background: white; cursor: pointer; transition: all .15s;
      white-space: nowrap; color: var(--text-muted);
    }
    .chip.on { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }

    /* ── SORT BAR ── */
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2px 14px 8px;
    }
    .sort-count { font-size: 12px; color: var(--text-muted); }
    .sort-controls { display: flex; gap: 7px; align-items: center; }
    .sort-sel, .toggle-consumed-btn {
      padding: 5px 10px; border-radius: 10px; border: 1px solid var(--border);
      background: white; font-size: 12px; cursor: pointer; color: var(--text);
    }
    .toggle-consumed-btn.on { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }

    /* ── FOOD LIST ── */
    .food-list { padding: 0 14px 100px; display: flex; flex-direction: column; gap: 9px; }

    /* ── FOOD CARD ── */
    .food-card {
      background: white; border-radius: var(--radius);
      padding: 13px 15px; border: 1.5px solid;
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform .15s; position: relative;
    }
    .food-card:active { transform: scale(0.985); }
    .food-card.ok       { border-color: #a7f3d0; }
    .food-card.soon     { border-color: #fde047; background: #fffef0; }
    .food-card.warning  { border-color: #fdba74; background: #fff8f2; }
    .food-card.critical { border-color: #fca5a5; background: #fff5f5; }
    .food-card.expired  { border-color: #cbd5e1; background: #f8fafc; opacity: .75; }
    .food-card.consumed { border-color: #e5e7eb; background: #fafafa; opacity: .5; }

    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-main { flex: 1; }
    .food-name { font-size: 16px; font-weight: 700; }
    .food-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 9px;
      font-weight: 500; white-space: nowrap;
    }
    .b-cat  { background: #e0f2fe; color: #0369a1; }
    .b-raw  { background: #fef9c3; color: #854d0e; }
    .b-cook { background: #dcfce7; color: #166534; }
    .b-who  { background: #f3e8ff; color: #7c3aed; }
    .b-qty  { background: #f1f5f9; color: #475569; }
    .b-decon{ background: #fef3c7; color: #b45309; }

    .food-dlc { display: flex; align-items: center; gap: 7px; margin-top: 7px; }
    .dlc-date { font-size: 12.5px; color: var(--text-muted); }
    .dlc-badge {
      font-size: 11.5px; font-weight: 700; padding: 2px 9px; border-radius: 9px;
    }
    .dlc-ok       { background: #dcfce7; color: #15803d; }
    .dlc-soon     { background: #fef9c3; color: #854d0e; }
    .dlc-warning  { background: #ffedd5; color: #9a3412; }
    .dlc-critical { background: #fee2e2; color: #991b1b; }
    .dlc-expired  { background: #f3f4f6; color: #6b7280; }

    .card-photo { width: 54px; height: 54px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }

    .card-detail { padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border); }
    .card-note { font-size: 12.5px; color: var(--text-muted); font-style: italic; margin-bottom: 6px; }
    .card-added { font-size: 11px; color: #94a3b8; margin-bottom: 8px; }
    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .ca-btn {
      flex: 1; min-width: 70px; padding: 8px 6px; border-radius: 10px;
      border: 1px solid var(--border); background: white; font-size: 12px;
      cursor: pointer; text-align: center; transition: all .15s; color: var(--text-muted);
    }
    .ca-btn:hover { background: var(--bg); }
    .ca-edit    { color: #2563eb; border-color: #bfdbfe; }
    .ca-edit:hover { background: #eff6ff; }
    .ca-decon   { color: #b45309; border-color: #fde68a; }
    .ca-decon:hover { background: #fefce8; }
    .ca-ok      { color: #16a34a; border-color: #bbf7d0; }
    .ca-ok:hover { background: #f0fdf4; }
    .ca-back    { color: #64748b; }
    .ca-del     { color: #ef4444; border-color: #fecaca; }
    .ca-del:hover { background: #fef2f2; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(22px + env(safe-area-inset-bottom)); right: 18px;
      width: 58px; height: 58px; border-radius: 29px;
      background: var(--primary-mid); color: white; border: none;
      font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(29,78,216,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; transition: transform .2s, box-shadow .2s;
    }
    .fab:hover  { transform: scale(1.08); box-shadow: 0 6px 24px rgba(29,78,216,0.5); }
    .fab:active { transform: scale(0.93); }

    /* ── MODAL (bottom sheet) ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.38);
      z-index: 300; display: flex; align-items: flex-end;
      animation: fadeIn .2s ease;
    }
    .sheet {
      background: white; width: 100%; max-width: 520px; margin: 0 auto;
      border-radius: 22px 22px 0 0;
      padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
      max-height: 93vh; overflow-y: auto;
      animation: slideUp .28s ease;
    }
    .sheet-handle { width: 38px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .sheet-title  { font-size: 19px; font-weight: 700; margin-bottom: 18px; }

    /* ── FULL SCREEN ── */
    .fullscreen {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 300; overflow-y: auto;
      animation: slideUp .28s ease;
    }
    .fs-header {
      background: white; padding: 14px 18px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .fs-title  { font-size: 17px; font-weight: 700; }
    .fs-body   { padding: 18px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    .back-btn  {
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text); width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9px; transition: background .15s; flex-shrink: 0;
    }
    .back-btn:hover { background: var(--border); }

    /* ── FORM ── */
    .fg { margin-bottom: 15px; }
    .fl {
      display: block; font-size: 11.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--text-muted); margin-bottom: 5px;
    }
    .fi, .fs-sel, .fta {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 15px; outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: white; color: var(--text); font-family: inherit;
    }
    .fi:focus, .fs-sel:focus, .fta:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
    }
    .fta { resize: vertical; min-height: 76px; }
    .qty-row { display: flex; gap: 9px; }
    .qty-row .fi { flex: 1; }
    .qty-row .fs-sel { flex: 1; }

    .toggle-group { display: flex; gap: 8px; }
    .tg-btn {
      flex: 1; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border);
      background: white; font-size: 14px; cursor: pointer; text-align: center;
      transition: all .15s; color: var(--text-muted);
    }
    .tg-btn.on { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }

    .dlc-preview {
      background: #f0f9ff; border: 1px solid #bae6fd;
      border-radius: 12px; padding: 11px 13px;
      font-size: 13px; color: #0369a1;
      display: flex; align-items: center; gap: 7px; margin-bottom: 14px;
    }

    .override-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); cursor: pointer; margin-bottom: 8px;
    }

    .photo-zone {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: all .15s; color: var(--text-muted);
    }
    .photo-zone:hover { border-color: var(--accent); color: var(--accent); }
    .photo-thumb { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; }

    .btn { padding: 13px 18px; border-radius: 13px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; transition: all .15s; }
    .btn-primary { background: var(--primary-mid); color: white; }
    .btn-primary:hover { background: #1d40af; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-ghost  { background: var(--bg); color: var(--text-muted); margin-top: 8px; }
    .btn-danger { background: #ef4444; color: white; }

    /* ── SETTINGS ── */
    .sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
    .srow {
      background: white; border: 1px solid var(--border); border-radius: 12px;
      padding: 13px 14px; display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 7px; cursor: pointer; transition: background .15s;
    }
    .srow:hover { background: var(--bg); }
    .srow.active { border-color: #2563eb; background: #eff6ff; }
    .srow-label { font-size: 15px; }
    .srow-sub   { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .srow-check { color: #2563eb; font-weight: 700; font-size: 16px; }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      font-size: 13px; padding: 9px 13px; border-radius: 10px; margin-bottom: 7px;
    }
    .status-pill.ok   { background: #dcfce7; color: #15803d; }
    .status-pill.warn { background: #fef9c3; color: #854d0e; }
    .status-pill.err  { background: #fee2e2; color: #991b1b; }

    /* ── ONBOARDING ── */
    .onboard {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 28px 22px;
      background: linear-gradient(155deg,#1e3a5f 0%,#1e40af 55%,#0ea5e9 100%);
      color: white;
    }
    .ob-logo  { font-size: 62px; margin-bottom: 10px; }
    .ob-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 5px; }
    .ob-sub   { font-size: 15px; opacity: .75; text-align: center; margin-bottom: 36px; }
    .ob-card  {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 400px;
    }
    .ob-card-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .ob-user-btn {
      display: flex; align-items: center; gap: 13px;
      width: 100%; padding: 15px 18px; border-radius: 15px;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06); color: white;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px;
      transition: all .2s;
    }
    .ob-user-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.45); }
    .ob-frow {
      display: flex; align-items: center; gap: 11px;
      padding: 13px 15px; border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: white; cursor: pointer;
      margin-bottom: 9px; transition: all .2s;
    }
    .ob-frow:hover, .ob-frow.on { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.5); }
    .ob-frow-txt .title { font-size: 14.5px; font-weight: 600; }
    .ob-frow-txt .sub   { font-size: 12px; opacity: .65; margin-top: 2px; }
    .ob-frow .check     { margin-left: auto; font-size: 16px; }
    .ob-link   { font-size: 12px; opacity: .6; text-align: center; margin-top: 9px; }
    .ob-link a { color: rgba(255,255,255,.8); }
    .ob-continue {
      width: 100%; margin-top: 15px; padding: 13px;
      border-radius: 13px; border: none; cursor: pointer;
      background: rgba(255,255,255,0.18); color: white;
      font-size: 15px; font-weight: 600; transition: background .2s;
    }
    .ob-continue:hover { background: rgba(255,255,255,0.28); }
    .ob-skip {
      background: none; border: none; color: rgba(255,255,255,.55);
      font-size: 13px; cursor: pointer; text-decoration: underline; margin-top: 14px;
      display: block; width: 100%; text-align: center;
    }
    .ob-fi, .ob-fta {
      width: 100%; padding: 11px 13px;
      background: rgba(255,255,255,0.1); color: white;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px; font-size: 14px; font-family: monospace; outline: none;
    }
    .ob-fta { resize: vertical; min-height: 130px; }
    .ob-fi::placeholder, .ob-fta::placeholder { color: rgba(255,255,255,0.4); }
    .ob-err { font-size: 12px; color: #fca5a5; margin-top: 5px; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 55px 22px; color: var(--text-muted); }
    .empty-ico { font-size: 58px; margin-bottom: 13px; }
    .empty h3  { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 7px; }
    .empty p   { font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ================================================================
// CONSTANTS
// ================================================================

const CATS = [
  { id:'fruit',           emoji:'🍎', label:'Fruits',           rc: true,  rlab:'Cru',   clab:'Cuit'  },
  { id:'legume',          emoji:'🥦', label:'Légumes',          rc: true,  rlab:'Cru',   clab:'Cuit'  },
  { id:'viande',          emoji:'🥩', label:'Viande',           rc: true,  rlab:'Crue',  clab:'Cuite' },
  { id:'viande_hachee',   emoji:'🫕', label:'Viande hachée',    rc: true,  rlab:'Crue',  clab:'Cuite' },
  { id:'poisson_maigre',  emoji:'🐟', label:'Poisson maigre',   rc: true,  rlab:'Cru',   clab:'Cuit'  },
  { id:'poisson_gras',    emoji:'🐠', label:'Poisson gras',     rc: true,  rlab:'Cru',   clab:'Cuit'  },
  { id:'produit_laitier', emoji:'🧀', label:'Produit laitier',  rc: false },
  { id:'glace',           emoji:'🍦', label:'Glace / Dessert',  rc: false },
  { id:'plat_cuisine',    emoji:'🥡', label:'Plat cuisiné',     rc: false },
  { id:'plat_maison',     emoji:'🍲', label:'Plat maison',      rc: false },
];

// Durées en jours pour un congélateur ★★★★
const DLC_BASE = {
  fruit:          { cru:365, cuit:90  },
  legume:         { cru:365, cuit:90  },
  viande:         { cru:365, cuit:90  },
  viande_hachee:  { cru:90,  cuit:90  },
  poisson_maigre: { cru:180, cuit:90  },
  poisson_gras:   { cru:90,  cuit:60  },
  produit_laitier:{ default:90  },
  glace:          { default:60  },
  plat_cuisine:   { default:90  },
  plat_maison:    { default:90  },
};

const FREEZERS = [
  { id:'4etoiles', label:'★★★★ Congélateur 4 étoiles', desc:'-18°C ou moins · Surgélation possible',       maxDays:365, mult:1.00 },
  { id:'3etoiles', label:'★★★ Congélateur 3 étoiles',  desc:'-18°C · Conservation longue durée',            maxDays:90,  mult:1.00 },
  { id:'2etoiles', label:'★★ Congélateur 2 étoiles',   desc:'-12°C · Maximum 1 mois',                       maxDays:30,  mult:0.33 },
  { id:'1etoile',  label:'★ Congélateur 1 étoile',     desc:'-6°C · Maximum 1 semaine',                     maxDays:7,   mult:0.17 },
  { id:'freezer',  label:'❄️ Compartiment freezer',    desc:'Dans votre réfrigérateur · Maximum 1 semaine', maxDays:7,   mult:0.17 },
];

const UNITS = ['portion(s)','g','kg','mL','L','pièce(s)','sachet(s)','boîte(s)','tranche(s)','unité(s)'];
const SORTS = [
  { id:'dlc',  label:'📅 Par DLC'   },
  { id:'name', label:'🔤 Par nom'   },
  { id:'new',  label:'🕐 Récents'   },
  { id:'cat',  label:'📦 Catégorie' },
];

// ================================================================
// UTILITIES
// ================================================================

function calcDLC(category, rawCooked, freezerId, dateAdded) {
  const base = DLC_BASE[category];
  if (!base) return null;
  const fr = FREEZERS.find(f => f.id === freezerId) || FREEZERS[0];
  let days = base.default !== undefined ? base.default : (base[rawCooked] || base.cru || 90);
  days = Math.min(Math.round(days * fr.mult), fr.maxDays);
  const d = new Date(dateAdded + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function daysUntil(dlcStr) {
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dlcStr + 'T00:00:00');
  return Math.ceil((d - t) / 86400000);
}

function dlcStatus(food) {
  if (food.status === 'consomme') return 'consumed';
  if (!food.dlc) return 'ok';
  const d = daysUntil(food.dlc);
  if (d < 0) return 'expired';
  if (d <= 7)  return 'critical';
  if (d <= 15) return 'warning';
  if (d <= 30) return 'soon';
  return 'ok';
}

function fmtDate(s) {
  if (!s) return '—';
  return new Date(s + 'T12:00:00').toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

function fmtDays(days) {
  if (days < 0)  return `Dépassé de ${Math.abs(days)} j`;
  if (days === 0) return "Aujourd'hui !";
  if (days === 1) return 'Demain !';
  if (days <= 7)  return `J-${days} ⚠️`;
  if (days <= 60) return `${days} j`;
  if (days < 120) return `${Math.round(days/7)} sem.`;
  return `${Math.round(days/30)} mois`;
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split('T')[0]; }

// ================================================================
// STORAGE (localStorage + Firebase)
// ================================================================

let db = null;
let fbUnsub = null;
let isRemoteUpdate = false;

function initFB(cfg) {
  try {
    if (typeof firebase === 'undefined') return false;
    if (firebase.apps && firebase.apps.length > 0) {
      firebase.apps.forEach(a => a.delete().catch(()=>{}));
    }
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    return true;
  } catch(e) { console.error('Firebase init:', e); return false; }
}

function ls(key, val) {
  try {
    if (val === undefined) {
      const v = localStorage.getItem('ca_' + key);
      return v ? JSON.parse(v) : null;
    }
    localStorage.setItem('ca_' + key, JSON.stringify(val));
  } catch {}
}

// ================================================================
// NOTIFICATIONS
// ================================================================

async function askNotif() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  const p = await Notification.requestPermission();
  return p === 'granted';
}

function notifyIfNeeded(foods) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const lastDate = ls('last_notif');
  if (lastDate === today()) return;
  ls('last_notif', today());

  const active = foods.filter(f => f.status !== 'consomme' && f.dlc);
  const expired  = active.filter(f => daysUntil(f.dlc) < 0);
  const critical = active.filter(f => { const d=daysUntil(f.dlc); return d>=0 && d<=7; });
  const warning  = active.filter(f => { const d=daysUntil(f.dlc); return d>7  && d<=15; });

  let delay = 800;
  [[expired,  '⚫ À jeter',        (n) => `${n} produit(s) périmé(s)`],
   [critical, '🔴 À consommer vite',(n) => `${n} produit(s) dans moins de 7 jours`],
   [warning,  '🟡 À planifier',    (n) => `${n} produit(s) à consommer dans 15 jours`],
  ].forEach(([list, title, body]) => {
    if (list.length > 0) {
      setTimeout(() => {
        new Notification(`❄️ CongélApp — ${title}`, {
          body: `${body(list.length)} : ${list.map(f=>f.name).join(', ')}`,
          icon: '/icon-192.png',
        });
      }, delay);
      delay += 1200;
    }
  });
}

function App() {
  const [ready,    setReady]    = useState(false);
  const [curUser,  setCurUser]  = useState('');
  const [settings, setSettings] = useState({ freezer:'4etoiles', fbCfg:null });
  const [foods,    setFoods]    = useState([]);
  const [fbReady,  setFbReady]  = useState(false);

  const [showAdd,      setShowAdd]      = useState(false);
  const [editFood,     setEditFood]     = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [search,       setSearch]       = useState('');
  const [activeCats,   setActiveCats]   = useState([]);
  const [sortBy,       setSortBy]       = useState('dlc');
  const [showConsumed, setShowConsumed] = useState(false);

  // ── MOUNT ──────────────────────────────────────────────────────
  useEffect(() => {
    const savedUser = ls('user');
    const savedSett = ls('settings');
    const savedFood = ls('foods') || [];
    if (savedUser && savedSett) {
      setCurUser(savedUser);
      setSettings(savedSett);
      setFoods(savedFood);
      setReady(true);
      if (savedSett.fbCfg) {
        const ok = initFB(savedSett.fbCfg);
        setFbReady(ok);
        if (ok) startSync();
      }
      setTimeout(() => notifyIfNeeded(savedFood), 1200);
    }
  }, []);

  // ── FIRESTORE SYNC ─────────────────────────────────────────────
  function startSync() {
    if (!db) return;
    if (fbUnsub) fbUnsub();
    fbUnsub = db.collection('foods').onSnapshot(snap => {
      const remote = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      isRemoteUpdate = true;
      setFoods(remote);
      ls('foods', remote);
      isRemoteUpdate = false;
    }, err => { console.error('Firestore:', err); setFbReady(false); });
  }

  // ── MUTATIONS ──────────────────────────────────────────────────
  const mutateFoods = (next) => {
    setFoods(next);
    ls('foods', next);
    if (db) {
      const batch = db.batch();
      next.forEach(f => {
        // strip photo from firestore (too large)
        const { photo, ...rest } = f;
        batch.set(db.collection('foods').doc(f.id), rest);
      });
      batch.commit().catch(console.error);
    }
  };

  const deleteFromDB = (id) => {
    if (db) db.collection('foods').doc(id).delete().catch(console.error);
  };

  // ── HANDLERS ──────────────────────────────────────────────────
  const onboard = ({ user, freezer, fbCfg }) => {
    const sett = { freezer, fbCfg };
    setCurUser(user); setSettings(sett); setReady(true);
    ls('user', user); ls('settings', sett);
    if (fbCfg) {
      const ok = initFB(fbCfg);
      setFbReady(ok);
      if (ok) startSync();
    }
    askNotif();
  };

  const updateSettings = (newSett) => {
    setSettings(newSett);
    ls('settings', newSett);
    if (newSett.fbCfg && newSett.fbCfg !== settings.fbCfg) {
      const ok = initFB(newSett.fbCfg);
      setFbReady(ok);
      if (ok) startSync();
    }
    // Recalculate DLCs if freezer changed and no manual override
    if (newSett.freezer !== settings.freezer) {
      const recalc = foods.map(f => f.dlcOverride ? f : {
        ...f,
        dlc: calcDLC(f.category, f.rawCooked, newSett.freezer, f.dateAdded)
      });
      mutateFoods(recalc);
    }
  };

  const saveFood = (food) => {
    food.addedBy = food.addedBy || curUser;
    const next = editFood
      ? foods.map(f => f.id === food.id ? food : f)
      : [food, ...foods];
    mutateFoods(next);
    setShowAdd(false); setEditFood(null);
  };

  const deleteFood = (id) => {
    mutateFoods(foods.filter(f => f.id !== id));
    deleteFromDB(id);
  };

  const setStatus = (id, status) => {
    mutateFoods(foods.map(f => f.id === id ? { ...f, status } : f));
  };

  const switchUser = () => {
    const next = curUser === 'Romain' ? 'Manon' : 'Romain';
    setCurUser(next); ls('user', next);
  };

  const toggleCat = (id) => {
    setActiveCats(p => p.includes(id) ? p.filter(c=>c!==id) : [...p, id]);
  };

  // ── FILTER + SORT ──────────────────────────────────────────────
  const displayed = useMemo(() => {
    let r = [...foods];
    if (!showConsumed) r = r.filter(f => f.status !== 'consomme');
    if (search.trim()) {
      const q = search.toLowerCase();
      r = r.filter(f =>
        f.name.toLowerCase().includes(q) ||
        (f.notes||'').toLowerCase().includes(q) ||
        (CATS.find(c=>c.id===f.category)?.label||'').toLowerCase().includes(q)
      );
    }
    if (activeCats.length) r = r.filter(f => activeCats.includes(f.category));
    r.sort((a,b) => {
      if (sortBy === 'dlc')  { if(!a.dlc) return 1; if(!b.dlc) return -1; return new Date(a.dlc)-new Date(b.dlc); }
      if (sortBy === 'name') return a.name.localeCompare(b.name,'fr');
      if (sortBy === 'new')  return new Date(b.dateAdded)-new Date(a.dateAdded);
      if (sortBy === 'cat')  return (a.category||'').localeCompare(b.category||'');
      return 0;
    });
    return r;
  }, [foods, search, activeCats, sortBy, showConsumed]);

  // ── ALERT COUNTS ──────────────────────────────────────────────
  const alerts = useMemo(() => {
    const act = foods.filter(f => f.status !== 'consomme' && f.dlc);
    return {
      expired:  act.filter(f => daysUntil(f.dlc) < 0).length,
      critical: act.filter(f => { const d=daysUntil(f.dlc); return d>=0 && d<=7; }).length,
      warning:  act.filter(f => { const d=daysUntil(f.dlc); return d>7  && d<=15; }).length,
    };
  }, [foods]);

  // ── RENDER ────────────────────────────────────────────────────
  if (!ready) return <Onboarding onDone={onboard}/>;

  const fr = FREEZERS.find(f => f.id === settings.freezer);
  const stockCount = foods.filter(f => f.status === 'stock').length;

  return (
    <div>
      {/* HEADER */}
      <div className="header">
        <div>
          <div className="header-title">❄️ CongélApp</div>
          <div className="header-sub">{stockCount} aliment{stockCount!==1?'s':''} · {fr?.label?.split(' ').slice(0,2).join(' ')}{fbReady ? ' · 🔥' : ''}</div>
        </div>
        <div className="header-right">
          <button className="user-pill" onClick={switchUser}>
            {curUser === 'Romain' ? '👨' : '👩'} {curUser}
          </button>
          <button className="icon-btn" onClick={() => setShowSettings(true)}>⚙️</button>
        </div>
      </div>

      {/* BANNERS */}
      {alerts.expired  > 0 && (
        <div className="banner expired">⚫ <span><strong>{alerts.expired} produit{alerts.expired>1?'s':''} périmé{alerts.expired>1?'s':''}</strong> — à vérifier ou jeter</span></div>
      )}
      {alerts.critical > 0 && (
        <div className="banner critical">🔴 <span><strong>{alerts.critical} produit{alerts.critical>1?'s':''}</strong> à consommer dans moins de 7 jours</span></div>
      )}
      {alerts.warning  > 0 && (
        <div className="banner warn">🟡 <span><strong>{alerts.warning} produit{alerts.warning>1?'s':''}</strong> à planifier dans les 15 jours</span></div>
      )}

      {/* SEARCH */}
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="search-input" placeholder="Rechercher un aliment…"
          value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      {/* CATEGORY CHIPS */}
      <div className="chips-scroll">
        {CATS.map(c => (
          <div key={c.id} className={`chip ${activeCats.includes(c.id)?'on':''}`} onClick={() => toggleCat(c.id)}>
            {c.emoji} {c.label}
          </div>
        ))}
      </div>

      {/* SORT BAR */}
      <div className="sort-bar">
        <span className="sort-count">{displayed.length} résultat{displayed.length!==1?'s':''}</span>
        <div className="sort-controls">
          <button className={`toggle-consumed-btn ${showConsumed?'on':''}`} onClick={() => setShowConsumed(!showConsumed)}>
            {showConsumed ? '✓' : '○'} Consommés
          </button>
          <select className="sort-sel" value={sortBy} onChange={e => setSortBy(e.target.value)}>
            {SORTS.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
        </div>
      </div>

      {/* LIST */}
      <div className="food-list">
        {displayed.length === 0
          ? <div className="empty">
              <div className="empty-ico">🧊</div>
              <h3>{foods.length === 0 ? 'Congélateur vide !' : 'Aucun résultat'}</h3>
              <p>{foods.length === 0 ? 'Appuyez sur + pour ajouter votre premier aliment.' : 'Essayez d\'autres mots-clés ou filtres.'}</p>
            </div>
          : displayed.map(f => (
              <FoodCard key={f.id} food={f}
                onEdit={f => { setEditFood(f); setShowAdd(true); }}
                onDelete={deleteFood}
                onStatus={setStatus}
              />
            ))
        }
      </div>

      {/* FAB */}
      <button className="fab" onClick={() => { setEditFood(null); setShowAdd(true); }}>+</button>

      {/* MODALS */}
      {showAdd && (
        <FoodModal
          onSave={saveFood}
          onClose={() => { setShowAdd(false); setEditFood(null); }}
          freezerId={settings.freezer}
          editData={editFood}
        />
      )}

      {showSettings && (
        <Settings
          settings={settings}
          onUpdate={updateSettings}
          onClose={() => setShowSettings(false)}
          fbReady={fbReady}
        />
      )}
    </div>
  );
}

// ── MOUNT ──────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
